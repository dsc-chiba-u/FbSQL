name: docker-build

env:
  IMAGE_NAME: fbsql

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-check-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Native amd64 build used as the test gate; the multi-platform
      # publish below rebuilds from the same Dockerfile.
      - name: Build development image
        run: docker build -t fbsql-dev -f docker/Dockerfile .

      - name: Install extension and run pg_regress
        run: scripts/docker-installcheck.sh

      # The image bakes the extension in; verify CREATE EXTENSION works
      # without a source mount, since that is what published-image users do.
      - name: Smoke-test CREATE EXTENSION in the baked image
        run: |
          docker run --rm -d --name fbsql-smoke \
            -e POSTGRES_HOST_AUTH_METHOD=trust fbsql-dev
          for _ in $(seq 1 60); do
            docker exec fbsql-smoke psql -U postgres -c "SELECT 1" >/dev/null 2>&1 && break
            sleep 1
          done
          sleep 2
          docker exec fbsql-smoke psql -U postgres -c "CREATE EXTENSION fbsql CASCADE;"
          docker exec fbsql-smoke psql -U postgres -c "SELECT fbsql.version();"
          docker stop fbsql-smoke

      - name: Compute image tags
        if: github.event_name != 'pull_request'
        id: vars
        run: |
          SHA_SHORT="$(git rev-parse --short HEAD)"
          GHCR="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          HUB="docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}"
          TAGS="$GHCR:latest,$GHCR:$SHA_SHORT,$HUB:latest,$HUB:$SHA_SHORT"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAGS="$TAGS,$GHCR:$GITHUB_REF_NAME,$HUB:$GITHUB_REF_NAME"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform images
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
