name: pgxn-release

# Publish the extension to PGXN. Runs on version tags (v*) or manually via
# workflow_dispatch. Requires the repository secrets PGXN_USERNAME and
# PGXN_PASSWORD (a manager.pgxn.org account); credentials never leave
# GitHub Secrets.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    env:
      PGXN_USERNAME: ${{ secrets.PGXN_USERNAME }}
      PGXN_PASSWORD: ${{ secrets.PGXN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate META.json and build the distribution archive
        run: |
          validate_pgxn_meta META.json
          pgxn-bundle

      # Skip the upload if this version is already on PGXN (e.g. the
      # version was published via workflow_dispatch before the tag push).
      - name: Release to PGXN
        run: |
          VERSION=$(grep -oE '"version": *"[^"]+"' META.json \
                    | head -1 | grep -oE '[0-9][^"]*')
          if curl -fsI "https://master.pgxn.org/dist/fbsql/$VERSION/" >/dev/null 2>&1; then
            echo "fbsql $VERSION is already on PGXN; skipping upload."
          else
            pgxn-release fbsql-*.zip
          fi
